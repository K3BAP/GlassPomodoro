name: Build & Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v6

      - name: Select latest Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Build release zip
        run: make release

      - name: Publish rolling "latest" release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest
          name: Latest build
          body: |
            Automated build from `main` (${{ github.sha }}).

            Ad-hoc signed: on first launch, right-click the app and choose **Open**
            (or remove quarantine: `xattr -dr com.apple.quarantine GlassPomodoro.app`).
          prerelease: true
          files: dist/GlassPomodoro.zip
